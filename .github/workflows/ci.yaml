name: CI pipeline to automate docker image release

on:
  push:
    branches:
      - dev
    paths-ignore:
      - '**/*.md'
      - '.vscode/**'
      - 'k8s/**'

jobs:

  security-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # this is added to fix super-linter linting error of "GITHUB_BEFORE_SHA"
      
      - name: Setup node v24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      
      - name: Check secret leaks in the repository
        uses: gitleaks/gitleaks-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Check vulnerability
        run: npm audit --audit-level=high

      - name: Display audit report
        if: always()
        run: npm audit --audit-level=high || true # 'true' if no vulnerability is found

  # separating linting to avoid dependency
  linting:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # this is added to fix super-linter linting error of "GITHUB_BEFORE_SHA"
      
      - name: Setup node v24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      
        # ESLint did not work, hence using super linter. This linter is slow as it pulls image from gcr. But couldn't find any better alternatives yet.
      - name: Check linting
        uses: super-linter/super-linter@v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: dev

  # unit-test:

  image-build:
    needs: [security-scan] # If this job requires all above security scans to pass, better to put them in one job. If any could be avoided (like linting in this case, then put it in a separate job)
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: harshitrajsinha/figma-clone
      IMAGE_TAG: ${{ github.sha }}

    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} # with block does not expand shell variable => requires env
          load: true
          push: false
      
      - name: Analyze for critical and high CVEs
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} # with block does not expand shell variable => requires env
          only-severities: critical
          exit-code: true
          sarif-file: sarif.output.json
          summary: true

      # Output will potentially be visible in repository's `security and quality` section
      - name: Upload SARIF result
        if: always()                        # Allows this step to run even if pipeline has to exit bcz 'critical' vulnerability has been found by docker scout in above step
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif.output.json
      
      # Output will potentially be visible in github actions' this workflow's artifacts
      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-scout-report
          path: sarif.output.json
  

  # release: