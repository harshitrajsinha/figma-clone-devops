name: CI pipeline to automate docker image release

on:
  push:
    branches:
      - dev
    paths-ignore:
      - '**/*.md'
      - '.vscode/**'
      - 'k8s/**'

jobs:

  security-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup node v24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      
      - name: Check secret leaks in the repository
        uses: gitleaks/gitleaks-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Check vulnerability
        run: npm audit --audit-level=high

      - name: Display audit report
        if: always()
        run: npm audit --audit-level=high || true # 'true' if no vulnerability is found

        # ESLint did not work, hence using super linter
      - name: Check linting
        uses: super-linter/super-linter@v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: dev


